<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Dashboard: Light 1 & Light 2</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8;
            padding: 20px;
            color: #333;
        }
        .dashboard {
            max-width: 1100px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        h2 {
            text-align: center;
            color: #1a237e;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .status-panel {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-bottom: 30px;
        }
        .card {
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            flex: 1;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            border-top: 4px solid #1a237e;
        }
        .card.light1 { border-top-color: #29b6f6; background-color: #e1f5fe; }
        .card.light2 { border-top-color: #ab47bc; background-color: #f3e5f5; }
        .card h3 {
            margin: 0 0 10px 0;
            font-size: 15px;
            color: #555;
        }
        .card p {
            margin: 0;
            font-size: 26px;
            font-weight: bold;
            color: #111;
        }
        #chart-container {
            position: relative;
            height: 480px;
            width: 100%;
            background: #fff;
            padding: 10px;
            border-radius: 8px;
        }
        .controls {
            text-align: center;
            margin-top: 30px;
        }
        button {
            padding: 12px 28px;
            background-color: #1a237e;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        button:hover {
            background-color: #0d47a1;
        }
        button:disabled {
            background-color: #b0bec5;
            cursor: not-allowed;
        }
        .live-indicator {
            color: #e53935;
            font-weight: bold;
            animation: blink 1s infinite;
            display: none;
            margin-left: 10px;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.2; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <h2>Dashboard ดึงข้อมูล API อัตโนมัติ (อัปเดตทุก 1 วินาที) <span id="live-dot" class="live-indicator">● LIVE</span></h2>
        
        <div class="status-panel">
            <div class="card">
                <h3>เวลาล่าสุด (Col B)</h3>
                <p id="display-time">--:--:--</p>
            </div>
            <div class="card light1">
                <h3>ค่า Light 1 ปัจจุบัน (Col C)</h3>
                <p id="display-light1">0</p>
            </div>
            <div class="card light2">
                <h3>ค่า Light 2 ปัจจุบัน (Col D)</h3>
                <p id="display-light2">0</p>
            </div>
        </div>
        
        <div id="chart-container">
            <canvas id="multiLineChart"></canvas>
        </div>
        
        <div class="controls">
            <button id="start-btn" onclick="startLiveUpdate()">เริ่มดึงข้อมูลแบบ Real-time</button>
        </div>
    </div>

    <script>
        let timeLabels = [];
        let light1Data = [];
        let light2Data = [];
        let lastFetchedTime = null; // ป้องกันการพล็อตข้อมูลเดิมซ้ำ

        const ctx = document.getElementById('multiLineChart').getContext('2d');
        const multiLineChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: timeLabels,
                datasets: [
                    {
                        label: 'Light 1 (Column C)',
                        data: light1Data,
                        borderColor: '#29b6f6',
                        backgroundColor: 'rgba(41, 182, 246, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.3,
                        pointRadius: 3
                    },
                    {
                        label: 'Light 2 (Column D)',
                        data: light2Data,
                        borderColor: '#ab47bc',
                        backgroundColor: 'rgba(171, 71, 188, 0.1)',
                        borderWidth: 3,
                        fill: true,
                        tension: 0.3,
                        pointRadius: 3
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: {
                    duration: 500, // ลดระยะเวลาแอนิเมชันให้พอดีกับการดึงทุก 1 วิ
                    easing: 'linear'
                },
                scales: {
                    x: {
                        title: { display: true, text: 'เวลา (Time)', font: { weight: 'bold' } }
                    },
                    y: {
                        title: { display: true, text: 'ค่าความเข้มแสง', font: { weight: 'bold' } },
                        suggestedMin: 0
                    }
                },
                plugins: {
                    legend: { position: 'top' }
                }
            }
        });

        async function fetchAndUpdate() {
            const url = "https://sheets.googleapis.com/v4/spreadsheets/1Rd9mjaPnnKMV9perRpXel148Fc6CCFZURU5ObSiFFww/values/realTime?alt=json&key=AIzaSyDvVrGDfJ6UmI74oUlMkqlelm5lmb9qabY";
            
            try {
                const response = await fetch(url);
                const json = await response.json();
                
                if (json.values && json.values.length > 1) {
                    // ดึงเฉพาะแถวสุดท้าย (ล่าสุด) มาแสดงผล
                    const lastRow = json.values[json.values.length - 1];
                    
                    // Column B (Index 1) = Time, Column C (Index 2) = Light 1, Column D (Index 3) = Light 2
                    const timeValue   = lastRow[1] || "N/A";
                    const light1Value = parseFloat(lastRow[2]) || 0;
                    const light2Value = parseFloat(lastRow[3]) || 0;

                    // อัปเดตตัวเลขใน Card
                    document.getElementById('display-time').innerText = timeValue;
                    document.getElementById('display-light1').innerText = light1Value;
                    document.getElementById('display-light2').innerText = light2Value;

                    // เช็คว่าข้อมูลนี้เป็นข้อมูลใหม่หรือไม่ (ถ้าใน 1 วินาทียังไม่มีแถวใหม่เข้ามา จะได้ไม่วาดจุดซ้ำที่เดิม)
                    if (timeValue === lastFetchedTime) return; 
                    lastFetchedTime = timeValue;

                    // นำข้อมูลใหม่ใส่กราฟ
                    timeLabels.push(timeValue);
                    light1Data.push(light1Value);
                    light2Data.push(light2Value);

                    // แสดงผลย้อนหลัง 30 จุด เพื่อไม่ให้กราฟดูอัดแน่นเกินไป
                    if (timeLabels.length > 30) {
                        timeLabels.shift();
                        light1Data.shift();
                        light2Data.shift();
                    }

                    multiLineChart.update();
                }
            } catch (error) {
                console.error("Error fetching data:", error);
            }
        }

        let liveInterval;
        function startLiveUpdate() {
            const btn = document.getElementById('start-btn');
            btn.disabled = true;
            btn.innerText = "กำลังเชื่อมต่อ API (ทุก 1 วินาที)...";
            
            // เปิดแสดงป้ายไฟกระพริบ LIVE
            document.getElementById('live-dot').style.display = 'inline';

            // ดึงข้อมูลครั้งแรกทันที
            fetchAndUpdate();

            // ตั้งค่าให้อัปเดตข้อมูลใหม่ทุกๆ 1,000 มิลลิวินาที (1 วินาที)
            liveInterval = setInterval(fetchAndUpdate, 1000);
        }
    </script>
</body>
</html>
