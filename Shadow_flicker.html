<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time ข้อมูล Light 1</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            padding: 20px;
            color: #333;
        }
        .dashboard {
            max-width: 1000px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
            color: #006064;
            margin-bottom: 25px;
        }
        .status-panel {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
        }
        .card {
            padding: 20px;
            background: #e0f7fa;
            border-radius: 10px;
            flex: 1;
            margin: 0 10px;
            text-align: center;
            box-shadow: inset 0 -3px 0 rgba(0, 131, 143, 0.2);
        }
        .card:first-child { margin-left: 0; }
        .card:last-child { margin-right: 0; }
        .card h3 {
            margin: 0 0 10px 0;
            font-size: 16px;
            color: #006064;
        }
        .card p {
            margin: 0;
            font-size: 28px;
            font-weight: bold;
            color: #00838f;
        }
        #chart-container {
            position: relative;
            height: 450px;
            width: 100%;
        }
        .controls {
            text-align: center;
            margin-top: 25px;
        }
        button {
            padding: 12px 25px;
            background-color: #00838f;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #005662;
        }
        button:disabled {
            background-color: #9e9e9e;
            cursor: not-allowed;
        }
        .live-indicator {
            color: red;
            font-weight: bold;
            animation: blink 1.5s infinite;
            display: none;
        }
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <h2>ระบบดึงข้อมูล Light 1 อัตโนมัติ <span id="live-dot" class="live-indicator">● LIVE</span></h2>
        
        <div class="status-panel">
            <div class="card">
                <h3>เวลาล่าสุด</h3>
                <p id="display-time">--:--</p>
            </div>
            <div class="card">
                <h3>ค่า Light 1 ปัจจุบัน</h3>
                <p id="display-light1">0</p>
            </div>
            <div class="card">
                <h3>Status</h3>
                <p id="display-status">-</p>
            </div>
        </div>
        
        <div id="chart-container">
            <canvas id="myChart"></canvas>
        </div>
        
        <div class="controls">
            <button id="start-btn" onclick="startLiveUpdate()">เริ่มดึงข้อมูล (อัปเดตทุก 5 วินาที)</button>
        </div>
    </div>

    <script>
        // โครงสร้างข้อมูลสำหรับกราฟ
        let timeLabels = [];
        let light1Data = [];
        let maxData = [];
        let minData = [];
        let lastFetchedTime = null; // ตัวแปรเก็บเวลาล่าสุดเพื่อกันการพล็อตข้อมูลซ้ำ

        // การตั้งค่า Chart.js
        const ctx = document.getElementById('myChart').getContext('2d');
        const myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: timeLabels,
                datasets: [
                    {
                        label: 'Light 1',
                        data: light1Data,
                        borderColor: '#26c6da',
                        backgroundColor: 'rgba(38, 198, 218, 0.2)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 4
                    },
                    {
                        label: 'Light 1 Max',
                        data: maxData,
                        borderColor: '#ef5350',
                        borderDash: [5, 5],
                        fill: false,
                        pointRadius: 0
                    },
                    {
                        label: 'Light 1 Min',
                        data: minData,
                        borderColor: '#66bb6a',
                        borderDash: [5, 5],
                        fill: false,
                        pointRadius: 0
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                animation: {
                    duration: 500,
                    easing: 'linear'
                },
                scales: {
                    x: { title: { display: true, text: 'เวลา', font: { weight: 'bold' } } },
                    y: { title: { display: true, text: 'ระดับข้อมูล', font: { weight: 'bold' } } }
                },
                plugins: {
                    legend: { position: 'top' }
                }
            }
        });

        // ฟังก์ชันไปดึงข้อมูล 1 ครั้ง
        async function fetchAndUpdate() {
            const url = "https://sheets.googleapis.com/v4/spreadsheets/1Rd9mjaPnnKMV9perRpXel148Fc6CCFZURU5ObSiFFww/values/realTime?alt=json&key=AIzaSyDvVrGDfJ6UmI74oUlMkqlelm5lmb9qabY";
            
            try {
                const response = await fetch(url);
                const json = await response.json();
                
                if (json.values && json.values.length > 1) {
                    // ดึงข้อมูลแถวสุดท้าย (ล่าสุด) จาก Sheet
                    const lastRow = json.values[json.values.length - 1];
                    
                    const timeStr   = lastRow[0] || "-";
                    const light1    = parseFloat(lastRow[1]) || 0;
                    const maxVal    = parseFloat(lastRow[2]) || 0;
                    const minVal    = parseFloat(lastRow[3]) || 0;
                    const statusStr = lastRow[4] || "-";

                    // อัปเดต Card ด้านบน
                    document.getElementById('display-time').innerText = timeStr;
                    document.getElementById('display-light1').innerText = light1;
                    document.getElementById('display-status').innerText = statusStr;

                    // อัปเดตกราฟ ก็ต่อเมื่อเป็นข้อมูลเวลาใหม่ (กันกราฟซ้ำหากข้อมูลใน Sheet ยังไม่เพิ่ม)
                    // ถ้าต้องการให้กราฟวาดซ้ำที่จุดเดิมแม้ข้อมูลไม่เปลี่ยน ให้ลบ 2 บรรทัดข้างล่างนี้ออกได้ครับ
                    if (timeStr === lastFetchedTime) return; 
                    lastFetchedTime = timeStr;

                    // เพิ่มข้อมูลเข้ากราฟ
                    timeLabels.push(timeStr);
                    light1Data.push(light1);
                    maxData.push(maxVal);
                    minData.push(minVal);

                    // หากข้อมูลล้นเกิน 20 จุดให้เลื่อนกราฟ
                    if (timeLabels.length > 20) {
                        timeLabels.shift();
                        light1Data.shift();
                        maxData.shift();
                        minData.shift();
                    }

                    myChart.update();
                }
            } catch (error) {
                console.error("Error fetching data:", error);
            }
        }

        // ฟังก์ชันสั่งให้ทำงานอัตโนมัติทุกๆ 5 วินาที
        let liveInterval;
        function startLiveUpdate() {
            const btn = document.getElementById('start-btn');
            btn.disabled = true;
            btn.innerText = "กำลังอัปเดตแบบ Real-time...";
            
            // แสดงไฟกระพริบ LIVE
            document.getElementById('live-dot').style.display = 'inline';

            // ดึงข้อมูลครั้งแรกทันที
            fetchAndUpdate();

            // สั่งให้ดึงข้อมูลใหม่ทุกๆ 5,000 มิลลิวินาที (5 วินาที)
            liveInterval = setInterval(fetchAndUpdate, 5000);
        }
    </script>
</body>
</html>
